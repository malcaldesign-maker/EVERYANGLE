<!--
  EVERYANGLE favicon — architectural "E" wordmark.
  Replace with your real favicon by overwriting this file at /public/favicon.svg.
  Keep dimensions square and the design simple at small sizes (it's rendered at 16-32px).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#020617"/>
  <!-- Stylized E: three horizontal bars + spine, segmented for the cyber/glitch feel -->
  <g fill="#ffffff">
    <rect x="7" y="6" width="2.5" height="20" rx="1"/>
    <rect x="9.5" y="6" width="14" height="3" rx="1"/>
    <rect x="9.5" y="14.5" width="11" height="3" rx="1"/>
    <rect x="9.5" y="23" width="14" height="3" rx="1"/>
  </g>
  <!-- Accent dot — signal/transmission cue, brand primary -->
  <circle cx="25" cy="7" r="1.5" fill="#6366F1"/>
</svg>
