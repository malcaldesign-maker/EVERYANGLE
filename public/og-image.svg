<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Subtle grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Brand mark (Signal icon) -->
  <g transform="translate(80, 80)">
    <g fill="#6366F1">
      <circle cx="0" cy="32" r="6"/>
    </g>
    <g fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round">
      <path d="M 0 32 Q 0 16 16 16"/>
      <path d="M 0 32 Q 0 -4 36 -4"/>
    </g>
    <text x="55" y="40" font-family="Sora, Arial, sans-serif" font-weight="800" font-size="22" fill="#ffffff" letter-spacing="2">EVERYANGLE</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="225" font-family="DM Sans, Arial, sans-serif" font-weight="800" font-size="14" letter-spacing="6" fill="#A855F7">
    AGENTIC INTELLIGENCE FOR PHYSICAL RETAIL
  </text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Sora, Arial, sans-serif" font-weight="700" font-size="92" fill="#ffffff">
    Every visit.
  </text>
  <text x="80" y="420" font-family="Sora, Arial, sans-serif" font-weight="700" font-size="92" fill="#6366F1" font-style="italic">
    Every insight.
  </text>

  <!-- Subline -->
  <text x="80" y="490" font-family="DM Sans, Arial, sans-serif" font-weight="500" font-size="22" fill="#94A3B8">
    Turning existing cameras into a real-time operating layer for stores.
  </text>

  <!-- Stat strip -->
  <g transform="translate(80, 540)">
    <rect width="1040" height="60" rx="14" fill="#0F172A" stroke="#1E293B"/>
    <g font-family="Sora, Arial, sans-serif" font-weight="700">
      <text x="32" y="40" font-size="24" fill="#ffffff">26x</text>
      <text x="80" y="40" font-size="11" fill="#64748B" letter-spacing="3">ROI · DOCUMENTED</text>

      <text x="290" y="40" font-size="24" fill="#ffffff">+30%</text>
      <text x="350" y="40" font-size="11" fill="#64748B" letter-spacing="3">CONVERSION LIFT</text>

      <text x="560" y="40" font-size="24" fill="#ffffff">14d</text>
      <text x="615" y="40" font-size="11" fill="#64748B" letter-spacing="3">PILOT SETUP</text>

      <text x="800" y="40" font-size="24" fill="#ffffff">98.7%</text>
      <text x="870" y="40" font-size="11" fill="#64748B" letter-spacing="3">QA ACCURACY</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
